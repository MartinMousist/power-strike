name: CI — Tests + Cobertura

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Build & Test (Java 17 / Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Compilar y ejecutar tests con cobertura
        working-directory: backend
        run: mvn verify --batch-mode

      - name: Publicar reporte JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

      - name: Resumen de cobertura en el PR
        uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          min-coverage-changed-files: 60
          title: "Cobertura JaCoCo"
          update-comment: true

      - name: Ejecutar Checkstyle
        working-directory: backend
        run: mvn checkstyle:check --batch-mode
        continue-on-error: true

      - name: Ejecutar PMD
        working-directory: backend
        run: mvn pmd:check --batch-mode
        continue-on-error: true

      - name: Publicar reporte PMD
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: backend/target/pmd.xml
          retention-days: 14
