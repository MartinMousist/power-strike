version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: powerstrike-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-powerstrike_db}
      POSTGRES_USER: ${DB_USER:-powerstrike}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-powerstrike123}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-powerstrike}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: powerstrike-backend
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-powerstrike_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-powerstrike}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-powerstrike123}
      JWT_SECRET: ${JWT_SECRET:-powerstrike-secret-key-2024-muy-larga-y-segura-para-hmac}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: powerstrike-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
